# /etc/greetd/hyprland-greeter.conf
# Compositor mínimo para la pantalla de login. Sin barras ni adornos:
# solo lanza el greeter de Quickshell. greetd mata esta sesión al
# autenticar y arranca la del usuario.

monitor = , preferred, auto, 1

# Arranca el greeter. Cuando greetd llama a launch(), termina este
# Hyprland y empieza la sesión real del usuario.
#
# NADA de watchdog que cierre Hyprland: greetd ya gestiona el ciclo de
# vida (mata la sesión del greeter al autenticar). Un watchdog con sleep
# provocaba que Hyprland se cerrase antes de que el greeter terminara de
# cargar → greetd lo relanzaba en bucle ("exited without creating a session").
exec-once = qs -p /etc/greetd/quickshell

general {
    border_size = 0
    gaps_in = 0
    gaps_out = 0
}

decoration {
    rounding = 0
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

animations {
    enabled = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = 0x101315
    # Nota: vfr (frames bajo demanda) ya viene activado por defecto en
    # Hyprland, así que no hace falta declararlo.
}

input {
    kb_layout = es      # ← cámbialo si usas otra distribución
    follow_mouse = 1
}

cursor {
    no_hardware_cursors = false
}
