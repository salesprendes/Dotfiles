# Campo de contraseña.
input-field {
    monitor          =
    size             = 320, 56
    outline_thickness = 2
    dots_size        = 0.26
    dots_spacing     = 0.30
    dots_center      = true
    rounding         = 12
    outer_color      = rgba(7aa2f7ff)
    inner_color      = rgba(292e42dd)
    font_color       = rgba(c0caf5ff)
    fade_on_empty    = false
    placeholder_text = <span foreground="##565f89">󰌾  Contraseña…</span>
    check_color      = rgba(e0af68ff)
    fail_color       = rgba(f7768eff)
    fail_text        = <span foreground="##f7768e">  $FAIL ($ATTEMPTS)</span>
    position         = 0, -40
    halign           = center
    valign           = center
}
