# hyprlock: pantalla de bloqueo (Tokyo Night Storm), a juego con Theme.qml.
# Ojo: aquí '#' es comentario; el hex en pango va con doble almohadilla (##rrggbb).

general {
    hide_cursor        = true
    grace              = 2      # segundos de margen para volver sin teclear
    ignore_empty_input = true
}

# Fondo: captura de la pantalla actual, difuminada.
background {
    monitor     =
    path        = screenshot
    blur_passes = 3
    blur_size   = 6
    noise       = 0.0117
    contrast    = 0.89
    brightness  = 0.78
    vibrancy    = 0.17
    color       = rgb(1a1b26)
}

# Reloj grande.
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +'%H:%M')"
    color       = rgba(c0caf5ff)
    font_size   = 96
    font_family = JetBrainsMono Nerd Font
    position    = 0, 160
    halign      = center
    valign      = center
}

# Fecha.
label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +'%A, %d de %B')"
    color       = rgba(a9b1d6ff)
    font_size   = 22
    font_family = JetBrainsMono Nerd Font
    position    = 0, 75
    halign      = center
    valign      = center
}

