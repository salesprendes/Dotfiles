# ╔══════════════════════════════════════════════════════════╗
# ║  hypridle · Gestión de inactividad (portátil)              ║
# ║  Requiere 'hypridle' + 'hyprlock'. Lo autoarranca           ║
# ║  conf/autostart.lua al iniciar Hyprland.                    ║
# ╚══════════════════════════════════════════════════════════╝

general {
    # Quickshell cierra sus paneles por sí mismo al detectar el bloqueo
    # (escucha la señal Lock de logind en shell.qml).
    lock_cmd       = pidof hyprlock || hyprlock   # evita lanzar dos
    before_sleep_cmd = loginctl lock-session       # bloquea antes de suspender
    after_sleep_cmd  = hyprctl dispatch dpms on     # enciende pantalla al volver
    ignore_dbus_inhibit = false                     # respeta inhibidores (vídeo)
}

# 2,5 min → atenuar brillo (se restaura al volver).
listener {
    timeout    = 150
    on-timeout = brightnessctl -s set 10%
    on-resume  = brightnessctl -r
}

# 5 min → bloquear sesión.
listener {
    timeout    = 300
    on-timeout = loginctl lock-session
}

# 6 min → apagar la pantalla (DPMS off).
listener {
    timeout    = 360
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# 30 min → suspender el sistema.
listener {
    timeout    = 1800
    on-timeout = systemctl suspend
}
