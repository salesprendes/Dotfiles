# hypridle: gestión de inactividad. Lo lanza autostart.lua. Necesita hyprlock.

general {
    # Quickshell cierra sus paneles solo al detectar el bloqueo (señal Lock de logind).
    lock_cmd       = pidof hyprlock || hyprlock   # evita lanzar dos
    before_sleep_cmd = loginctl lock-session       # bloquea antes de suspender
    after_sleep_cmd  = hyprctl dispatch dpms on     # enciende pantalla al volver
    ignore_dbus_inhibit = false                     # respeta inhibidores (vídeo)
}

# 2,5 min sin actividad: baja el brillo (se restaura al volver).
listener {
    timeout    = 150
    on-timeout = brightnessctl -s set 10%
    on-resume  = brightnessctl -r
}

# 5 min: bloqueo.
listener {
    timeout    = 300
    on-timeout = loginctl lock-session
}

# 6 min: apaga la pantalla (DPMS off).
listener {
    timeout    = 360
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# 30 min: suspende.
listener {
    timeout    = 1800
    on-timeout = systemctl suspend
}
