### ~/.config/starship.toml
### Prompt de una lГӯnea В· estilo Tokyo Night В· Nerd Font
###   LГӯnea: usuario@host (solo SSH) В· ruta В· git В· lenguajes В· jobs В· duraciГіn В· вқҜ
###   Derecha: hora. Los mГіdulos de lenguaje/estado solo aparecen en contexto,
###            asГӯ que a diario el prompt se ve minimalista (ruta В· git В· вқҜ).

# LГӯnea en blanco antes de cada prompt, para que respire.
add_newline = true

format = """
$username$hostname\
$directory\
$git_branch$git_status$git_state\
$nodejs$python$rust$golang$lua$java$php\
$jobs\
$cmd_duration\
$character"""

# Reloj alineado a la derecha de la primera lГӯnea.
right_format = "$time"

# Paleta -------------------------------------------------------------------
palette = "tokyonight"

[palettes.tokyonight]
fg     = "#c0caf5"
blue   = "#7aa2f7"
cyan   = "#7dcfff"
green  = "#9ece6a"
yellow = "#e0af68"
orange = "#ff9e64"
red    = "#f7768e"
purple = "#bb9af7"
gray   = "#565f89"

# Usuario @ host (solo en SSH o como root; en local normal no molesta) ------
[username]
style_user = "fg:orange bold"
style_root = "fg:red bold"
format = "[$user]($style)"
show_always = false

[hostname]
ssh_only = true
style = "fg:orange bold"
format = "[@$hostname]($style) "
trim_at = "."

# Directorio (ruta completa, como la tenГӯas) -------------------------------
[directory]
style = "fg:cyan bold"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 0        # 0 = sin recortar: muestra la ruta completa
truncate_to_repo = false     # no colapsar a la raГӯz del repositorio git
truncation_symbol = "вҖҰ/"
home_symbol = "~"
read_only = " у°Ңҫ"
read_only_style = "fg:red"

# Git ----------------------------------------------------------------------
[git_branch]
symbol = "оӮ  "
style = "fg:purple bold"
format = "[$symbol$branch]($style) "

[git_status]
style = "fg:yellow"
format = "[$all_status$ahead_behind]($style)"
conflicted = "вҡ” "
ahead      = "вҮЎ${count} "
behind     = "вҮЈ${count} "
diverged   = "вҮ• "
untracked  = "?${count} "
stashed    = "у°Ҹ— "
modified   = "!${count} "
staged     = "+${count} "
renamed    = "В»${count} "
deleted    = "вңҳ${count} "

# Estado de git durante operaciones (rebase, merge, cherry-pickвҖҰ) -----------
[git_state]
style = "fg:orange bold"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

# Chips de lenguaje: solo se muestran en proyectos que los usan -------------
[nodejs]
symbol = "оңҳ "
style = "fg:green"
format = "[$symbol($version )]($style)"
detect_extensions = []

[python]
symbol = "оңј "
style = "fg:yellow"
format = "[$symbol($version )]($style)"
# Solo en proyectos reales (pyproject.toml, requirements.txt, setup.py, Pipfile,
# .python-version, tox.ini, __init__.py). Sin esto, un .py suelto ya lo activaba.
detect_extensions = []

[rust]
symbol = "оһЁ "
style = "fg:orange"
format = "[$symbol($version )]($style)"
detect_extensions = []

[golang]
symbol = "оҳ§ "
style = "fg:cyan"
format = "[$symbol($version )]($style)"
detect_extensions = []

[lua]
symbol = "оҳ  "
style = "fg:blue"
format = "[$symbol($version )]($style)"
detect_extensions = []

[java]
symbol = "оңё "
style = "fg:red"
format = "[$symbol($version )]($style)"
detect_extensions = []

[php]
symbol = "оңҪ "
style = "fg:purple"
format = "[$symbol($version )]($style)"
detect_extensions = []

# Trabajos en segundo plano (Ctrl+Z) ---------------------------------------
[jobs]
symbol = "у°‘® "
style = "fg:blue bold"
format = "[$symbol$number]($style) "
number_threshold = 1

# DuraciГіn del Гәltimo comando (solo si tardГі > 2 s) ------------------------
[cmd_duration]
min_time = 2000
style = "fg:gray"
format = "[уұҺ« $duration]($style) "

# Hora (a la derecha) ------------------------------------------------------
[time]
disabled = false
time_format = "%H:%M"
style = "fg:gray"
format = "[у°…җ $time]($style)"

# SГӯmbolo de entrada -------------------------------------------------------
[character]
success_symbol = "[вқҜ](bold green)"
error_symbol = "[вқҜ](bold red)"
vimcmd_symbol = "[вқ®](bold purple)"
